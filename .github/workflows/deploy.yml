name: CI and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: babywishlist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: SKIP_APP_POSTINSTALL=1 bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production
    env:
      DEPLOY_PATH: /home/seed/babywishlist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to deploy directory
        run: |
          mkdir -p "$DEPLOY_PATH"
          rsync -a --delete --exclude ".git/" "$GITHUB_WORKSPACE"/ "$DEPLOY_PATH"/

      - name: Write production environment
        run: printf '%s\n' "${{ secrets.ENV }}" > "$DEPLOY_PATH/.env"

      - name: Verify Docker Compose config
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose config

      - name: Build app image
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose build app

      - name: Start infrastructure
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose up -d minio

      - name: Deploy app
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose up -d app

      - name: Configure MinIO
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose run --rm minio-init

      - name: Show service status
        working-directory: ${{ env.DEPLOY_PATH }}
        run: docker compose ps
