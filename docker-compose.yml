services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - app_internal
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.babywishlist-minio.rule=Host(`${MINIO_HOST}`)
      - traefik.http.routers.babywishlist-minio.entrypoints=websecure
      - traefik.http.routers.babywishlist-minio.tls.certresolver=letsencrypt
      - traefik.http.routers.babywishlist-minio.service=babywishlist-minio
      - traefik.http.services.babywishlist-minio.loadbalancer.server.port=9000

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    networks:
      - app_internal
    environment:
      APP_ORIGIN: https://${APP_HOST}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do sleep 2; done;
      if [ $${#MINIO_ACCESS_KEY} -lt 3 ]; then echo 'MINIO_ACCESS_KEY must be at least 3 characters'; exit 1; fi;
      if [ $${#MINIO_SECRET_KEY} -lt 8 ]; then echo 'MINIO_SECRET_KEY must be at least 8 characters'; exit 1; fi;
      mc mb --ignore-existing \"local/$${MINIO_BUCKET}\";
      mc anonymous set download \"local/$${MINIO_BUCKET}\";
      mc admin user add local \"$${MINIO_ACCESS_KEY}\" \"$${MINIO_SECRET_KEY}\" || true;
      mc admin policy attach local readwrite --user \"$${MINIO_ACCESS_KEY}\";
      printf '<CORSConfiguration><CORSRule><AllowedOrigin>%s</AllowedOrigin><AllowedMethod>GET</AllowedMethod><AllowedMethod>PUT</AllowedMethod><AllowedMethod>HEAD</AllowedMethod><AllowedHeader>*</AllowedHeader><ExposeHeader>ETag</ExposeHeader><MaxAgeSeconds>3000</MaxAgeSeconds></CORSRule></CORSConfiguration>' \"$${APP_ORIGIN}\" > /tmp/cors.xml;
      mc cors set \"local/$${MINIO_BUCKET}\" /tmp/cors.xml;
      "

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      MINIO_PUBLIC_ENDPOINT: https://${MINIO_HOST}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - app_data:/app/data
    networks:
      - app_internal
      - traefik_proxy
    depends_on:
      - minio
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.babywishlist-app.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.babywishlist-app.entrypoints=websecure
      - traefik.http.routers.babywishlist-app.tls.certresolver=letsencrypt
      - traefik.http.services.babywishlist-app.loadbalancer.server.port=3001

volumes:
  app_data:
  minio_data:

networks:
  app_internal:
  traefik_proxy:
    external: true
    name: ${TRAEFIK_NETWORK}
