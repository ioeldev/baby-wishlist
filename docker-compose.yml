services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_HOST}
      MINIO_SERVER_URL: https://${MINIO_HOST}
    volumes:
      - minio_data:/data
    networks:
      - app_internal
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.babywishlist-minio.rule=Host(`${MINIO_HOST}`)
      - traefik.http.routers.babywishlist-minio.entrypoints=websecure
      - traefik.http.routers.babywishlist-minio.tls.certresolver=letsencrypt
      - traefik.http.routers.babywishlist-minio.service=babywishlist-minio
      - traefik.http.services.babywishlist-minio.loadbalancer.server.port=9000
      - traefik.http.routers.babywishlist-minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)
      - traefik.http.routers.babywishlist-minio-console.entrypoints=websecure
      - traefik.http.routers.babywishlist-minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.babywishlist-minio-console.service=babywishlist-minio-console
      - traefik.http.services.babywishlist-minio-console.loadbalancer.server.port=9001

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      MINIO_PUBLIC_ENDPOINT: https://${MINIO_HOST}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - ./data:/app/data
    networks:
      - app_internal
      - traefik_proxy
    depends_on:
      - minio
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK}
      - traefik.http.routers.babywishlist-app.rule=Host(`${APP_HOST}`)
      - traefik.http.routers.babywishlist-app.entrypoints=websecure
      - traefik.http.routers.babywishlist-app.tls.certresolver=letsencrypt
      - traefik.http.services.babywishlist-app.loadbalancer.server.port=3001

volumes:
  minio_data:

networks:
  app_internal:
  traefik_proxy:
    external: true
    name: ${TRAEFIK_NETWORK}
